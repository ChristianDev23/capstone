<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netsiv - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!--HAHAHAHAHAHAHA TAGAY ILA JIMBOY -->
    <div class="login-card">
        <div class="logo-area">
            <img src="assets/logo.png" alt="Netsiv Logo">
        </div>
        <h2 class="login-title">Login</h2>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
            <span class="lock-icon" id="togglePassword">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="#aaa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </span>
        </div>
        <button class="btn-login" id="loginBtn">Login</button>
    </div>
    <div id="notification" class="notification"></div>
    <script src="javascript/script.js"></script>
</body>
</html>

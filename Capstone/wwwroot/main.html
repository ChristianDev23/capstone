<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Inventory Dashboard</title>
<link rel="stylesheet" href="css/design.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="sidebar">
    <h2>Inventory</h2>
    <ul>
        <li>Dashboard</li>  
        <li>Products</li>
        <li id="logoutBtn">LOGOUT</li>
    </ul>
</div>
<div class="main">
    <div class="topbar">
        <input type="text" id="search" class="search" placeholder="Search products...">
        <button class="btn" id="addBtn" onclick="openModal()">+ Add Product</button>
    </div>
    <div class="cards">
        <div class="card">
            <h3>Total Products</h3>
            <h2 id="totalProducts">0</h2>
        </div>
        <div class="card">
            <h3>Available</h3>
            <h2 id="available">0</h2>
        </div>
        <div class="card">
            <h3>Low Stock</h3>
            <h2 id="low">0</h2>
        </div>
        <div class="card">
            <h3>Out of Stock</h3>
            <h2 id="out">0</h2>
        </div>
    </div>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="productTable"></tbody>
    </table>
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3>Add Product</h3>
            <input type="text" id="name" placeholder="Product Name">
            <input type="text" id="category" placeholder="Category">
            <input type="number" id="qty" placeholder="Quantity">
            <button class="btn" onclick="saveProduct()">Save</button>
            <button onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>
<script src="javascript/function.js"></script>
</body>
</html>
